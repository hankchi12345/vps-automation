apiVersion: 1
providers:
  - name: 'Standard Dashboards'
    folder: 'Infrastructure'
    type: file
    disableDeletion: true
    options:
      path: /var/lib/grafana/dashboards # how the container mount the dashboard folder in docker-compose.yml
      foldersFromFilesStructure: true # This will create subfolders in Grafana according to the file structure in the mounted path